<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entropic Field v14</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; position:fixed; inset:0; }
#ui {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:32px;
  background:#000; z-index:10; transition:opacity 1.2s ease;
}
#ui.gone { opacity:0; pointer-events:none; }
.wm {
  font-family:Georgia,serif; font-size:13px; letter-spacing:14px;
  color:rgba(255,220,140,0.85); text-transform:uppercase;
}
.dz {
  width:460px; max-width:85vw; height:140px; border:1px solid rgba(220,175,70,0.6);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; cursor:pointer; transition:border-color .4s;
}
.dz:hover { border-color:rgba(220,175,70,0.85); }
.dz span { font-family:'Courier New',monospace; font-size:13px;
  letter-spacing:5px; color:rgba(235,195,100,0.8); }
#fn { font-family:'Courier New',monospace; font-size:10px; letter-spacing:2px;
  color:rgba(240,205,110,0.85); min-height:14px; }

#style-selector {
  display:flex; gap:0; border:1px solid rgba(255,255,255,0.12);
}
.sty-btn {
  padding:9px 0; width:64px; background:none; border:none;
  border-right:1px solid rgba(255,255,255,0.08);
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:5px; transition:background .25s;
  color:rgba(255,255,255,0.35);
}
.sty-btn:last-child { border-right:none; }
.sty-btn:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7); }
.sty-btn.active { background:rgba(255,255,255,0.10); color:rgba(255,255,255,0.92); }
.sty-icon { font-size:15px; line-height:1; font-variant-emoji:text; }
.sty-label {
  font-family:'Courier New',monospace; font-size:7px;
  letter-spacing:2px; text-transform:uppercase;
}

#pb { display:none; background:none; border:1px solid rgba(220,175,70,0.55);
  color:rgba(240,205,110,0.9); padding:14px 48px; cursor:pointer;
  font-family:'Courier New',monospace; font-size:13px; letter-spacing:6px;
  text-transform:uppercase; transition:all .3s; }
#pb:hover { border-color:rgba(220,175,70,0.9); color:rgba(255,220,140,1); }
#hud {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  display:none; gap:26px; align-items:center;
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:3px;
  color:rgba(255,255,255,0.5);
}
#hud.on { display:flex; }
#spectrograph-3d {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  display:none; flex-direction:column; align-items:center; z-index:15;
  font-family:'Courier New',monospace;
  pointer-events:none;
  width:min(560px,80vw);
}
#spectrograph-3d.on { display:flex; }
#spectrograph-canvas {
  width:100%; height:120px;
}
#spectrograph-labels {
  display:flex; justify-content:space-between; width:100%;
  font-size:7px; letter-spacing:1.5px; opacity:0.35; margin-top:2px;
  color:rgba(255,255,255,0.5);
}

#style-switcher {
  position:fixed; right:22px; top:50%; transform:translateY(-50%);
  display:none; flex-direction:column; gap:6px; z-index:20;
}
#style-switcher.on { display:flex; }
.sw-btn {
  width:38px; height:38px; background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.12); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:all .2s; border-radius:2px;
  color:rgba(255,255,255,0.5); font-variant-emoji:text;
}
.sw-btn:hover { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.9); border-color:rgba(255,255,255,0.35); }
.sw-btn.active { background:rgba(255,255,255,0.18); color:#fff; border-color:rgba(255,255,255,0.6); }

#progress-bar {
  position:fixed; bottom:55px; left:50%; transform:translateX(-50%);
  display:none; flex-direction:column; align-items:center; gap:8px;
  width:min(560px,80vw);
}
#progress-bar.on { display:flex; }
#prog-track {
  width:100%; height:2px; background:rgba(255,255,255,0.12);
  position:relative; cursor:pointer;
}
#prog-track:hover { background:rgba(255,255,255,0.25); }
#prog-fill {
  height:100%; background:rgba(255,255,255,0.45);
  width:0; pointer-events:none; transition:width 0.1s linear;
}
#prog-thumb {
  position:absolute; top:50%; right:auto; left:0%;
  transform:translate(-50%,-50%);
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.8);
  pointer-events:none; opacity:0; transition:opacity .2s;
}
#prog-track:hover #prog-thumb { opacity:1; }
#prog-times {
  width:100%; display:flex; justify-content:space-between;
  font-family:'Courier New',monospace; font-size:9px; letter-spacing:2px;
  color:rgba(255,255,255,0.4);
}

/* ── Volume control ────────────────────────────── */
#vol-wrap {
  position:fixed; right:22px; bottom:22px; z-index:20;
  display:none; flex-direction:column; align-items:center; gap:6px;
}
#vol-wrap.on { display:flex; }
#vol-track {
  width:3px; height:0; background:rgba(255,255,255,0.10);
  position:relative; cursor:pointer; transition:height .3s ease;
  border-radius:2px; overflow:visible;
}
#vol-wrap:hover #vol-track,
#vol-wrap.expanded #vol-track { height:80px; }
#vol-fill {
  position:absolute; bottom:0; width:100%;
  background:rgba(255,255,255,0.40); border-radius:2px;
  pointer-events:none; height:70%;
}
#vol-thumb {
  position:absolute; left:50%; bottom:70%;
  transform:translate(-50%,50%);
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,255,255,0.8);
  pointer-events:none; opacity:0; transition:opacity .2s;
}
#vol-wrap:hover #vol-thumb { opacity:1; }
#vol-icon {
  font-size:13px; color:rgba(255,255,255,0.4);
  cursor:pointer; user-select:none; transition:color .2s;
  padding:4px;
}
#vol-icon:hover { color:rgba(255,255,255,0.8); }

/* ── Waveform minimap ──────────────────────────── */
#waveform-canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; opacity:0.35;
}

/* ── Keyboard hints overlay ────────────────────── */
#kb-hints {
  position:fixed; inset:0; z-index:50;
  display:none; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.82);
  backdrop-filter:blur(6px);
  animation:hintFadeIn .25s ease;
}
#kb-hints.on { display:flex; }
@keyframes hintFadeIn { from{opacity:0} to{opacity:1} }
.kb-grid {
  display:grid; grid-template-columns:auto auto;
  gap:10px 28px; font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:2px;
  color:rgba(235,195,100,0.75);
}
.kb-key {
  text-align:right;
  color:rgba(255,220,140,0.9);
  border:1px solid rgba(220,175,70,0.35);
  padding:3px 8px; border-radius:2px;
  font-size:9px;
}
.kb-desc { padding:3px 0; }
.kb-title {
  grid-column:1/-1; text-align:center;
  font-size:11px; letter-spacing:6px;
  color:rgba(255,220,140,0.85);
  margin-bottom:8px; text-transform:uppercase;
}

/* ── Stop / Back button ────────────────────────── */
#stop-btn {
  position:fixed; left:22px; top:22px; z-index:20;
  display:none; background:none;
  border:1px solid rgba(255,255,255,0.10);
  color:rgba(255,255,255,0.4); cursor:pointer;
  font-family:'Courier New',monospace; font-size:9px;
  letter-spacing:2px; border-radius:2px;
  padding:8px 14px; transition:all .2s;
}
#stop-btn.on { display:block; }
#stop-btn:hover {
  border-color:rgba(255,255,255,0.35);
  color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.04);
}

/* ── Fullscreen btn ────────────────────────────── */
#fs-btn {
  position:fixed; left:22px; bottom:22px; z-index:20;
  display:none; width:32px; height:32px;
  background:none; border:1px solid rgba(255,255,255,0.10);
  color:rgba(255,255,255,0.4); cursor:pointer;
  font-size:12px; border-radius:2px;
  transition:all .2s;
}
#fs-btn.on { display:block; }
#fs-btn:hover {
  border-color:rgba(255,255,255,0.35);
  color:rgba(255,255,255,0.8);
  background:rgba(255,255,255,0.04);
}

/* ── Style transition overlay ──────────────────── */
#style-flash {
  position:fixed; inset:0; z-index:5;
  background:#000; opacity:0; pointer-events:none;
  transition:opacity 0.15s ease;
}
#style-flash.flash { opacity:0.6; }

/* ── Touch-friendly overrides ──────────────────── */
@media (pointer:coarse) {
  .sw-btn { width:44px; height:44px; font-size:16px; }
  #pause-btn { min-width:44px; min-height:44px; font-size:14px !important; }
  #prog-track { height:6px; }
  #vol-track { width:5px; }
  #fs-btn { width:44px; height:44px; font-size:15px; }
  #spectrograph-3d { bottom:72px; }
}

/* ── Copyright at bottom of upload screen ──────── */
.copyright {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  font-family:'Courier New',monospace; font-size:8px;
  letter-spacing:3px; color:rgba(220,175,70,0.6);
  text-transform:uppercase; white-space:nowrap;
  z-index:11;
}
#ui.gone .copyright { opacity:0; pointer-events:none; }

/* ── Init hint at bottom of upload screen ──────── */
.init-hint {
  font-family:'Courier New',monospace; font-size:8px;
  letter-spacing:3px; color:rgba(200,160,80,0.3);
  text-transform:uppercase; margin-top:8px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="wm">Entropic Field</div>
  <div class="dz" id="dz">
    <span>⊙&#xFE0E;</span><span>Drop audio &nbsp;·&nbsp; click to browse</span>
    <input type="file" id="fi" accept="audio/*,.wav,.mp3,.flac,.aac,.m4a,.ogg,.wav,audio/wav,audio/x-wav,audio/wave" style="display:none">
  </div>
  <div id="fn"></div>

  <div id="style-selector">
    <button class="sty-btn active" data-style="0"><span class="sty-icon">✦&#xFE0E;</span><span class="sty-label">Entropic</span></button>
    <button class="sty-btn" data-style="1"><span class="sty-icon">✦&#xFE0E;</span><span class="sty-label">Cosmos</span></button>
    <button class="sty-btn" data-style="2"><span class="sty-icon">✦&#xFE0E;</span><span class="sty-label">Sacra</span></button>
    <button class="sty-btn" data-style="3"><span class="sty-icon">✦&#xFE0E;</span><span class="sty-label">Geometry</span></button>
    <button class="sty-btn" data-style="4"><span class="sty-icon">✦&#xFE0E;</span><span class="sty-label">Organic</span></button>
  </div>

  <button id="pb">Initialize</button>
  <div class="init-hint">Space · Arrows · 1–5 · F · Esc · ? for keys</div>
  <div class="copyright">EveryZ Studio © copyright reserved 2026</div>
</div>

<div id="style-flash"></div>

<div id="style-switcher">
  <button class="sw-btn active" data-style="0" title="Entropic">✦&#xFE0E;</button>
  <button class="sw-btn" data-style="1" title="Cosmos">✦&#xFE0E;</button>
  <button class="sw-btn" data-style="2" title="Sacra">✦&#xFE0E;</button>
  <button class="sw-btn" data-style="3" title="Geometry">✦&#xFE0E;</button>
  <button class="sw-btn" data-style="4" title="Organic">✦&#xFE0E;</button>
</div>

<button id="fs-btn" title="Fullscreen (F)">⛶&#xFE0E;</button>
<button id="stop-btn" title="Stop & return (Esc)">✕ STOP</button>

<div id="vol-wrap">
  <div id="vol-track">
    <div id="vol-fill"></div>
    <div id="vol-thumb"></div>
  </div>
  <span id="vol-icon">♪&#xFE0E;</span>
</div>

<div id="kb-hints">
  <div class="kb-grid">
    <div class="kb-title">Keyboard</div>
    <span class="kb-key">Space</span><span class="kb-desc">Play / Pause</span>
    <span class="kb-key">← →</span><span class="kb-desc">Seek ±5s</span>
    <span class="kb-key">↑ ↓</span><span class="kb-desc">Volume</span>
    <span class="kb-key">1 – 5</span><span class="kb-desc">Visual Style</span>
    <span class="kb-key">F</span><span class="kb-desc">Fullscreen</span>
    <span class="kb-key">M</span><span class="kb-desc">Mute</span>
    <span class="kb-key">Esc</span><span class="kb-desc">Stop &amp; Return</span>
    <span class="kb-key">?</span><span class="kb-desc">This overlay</span>
  </div>
</div>

<div id="spectrograph-3d">
  <canvas id="spectrograph-canvas" width="560" height="120"></canvas>
  <div id="spectrograph-labels"><span>BASS</span><span>MID</span><span>HI</span></div>
</div>

<div id="hud">
  <span id="hk" style="opacity:0;transition:opacity .06s">◉&#xFE0E;</span>
</div>
<span id="struct-phase" style="
  position:fixed; right:52px; bottom:24px; z-index:20;
  font-family:'Courier New',monospace;
  font-size:9px; letter-spacing:2px; opacity:0;
  color:rgba(255,255,255,0.5); transition:opacity 0.8s, color 0.8s;
  display:none;
"></span>
<div id="progress-bar">
  <div id="prog-track">
    <canvas id="waveform-canvas"></canvas>
    <div id="prog-fill"></div>
    <div id="prog-thumb"></div>
  </div>
  <div id="prog-times">
    <span id="prog-cur">0:00</span>
    <button id="pause-btn" style="
      background:none; border:none; color:rgba(255,255,255,0.5);
      font-family:'Courier New',monospace; font-size:11px; letter-spacing:2px;
      cursor:pointer; padding:0 8px; transition:color .2s;
    ">❙❙</button>
    <span id="prog-tot">0:00</span>
  </div>
</div>

<script>
// ================================================================
// AUDIO ENGINE
// ================================================================
let actx, analyser, fdata, abuf, srcNode, startTime=0, startOffset=0;
let isPlaying=false, songDuration=0;
let seekedRecently=false;
let gainNode;  // volume control
let currentVolume = 0.7;

var AP = { sb:0,sm:0,sh:0, rb:0,rm:0,rh:0,
           kick:0, kickDecay:0,
           snare:0, snareDecay:0,
           energy:0,
           relativeIntensity:0,
           burstFlash:0,
           hiDense:0,
           dropAlert:0,
           bassRatio:0.33, hiRatio:0.33,
           spectralContrast:0,
           // [v9] new signals
           rSub:0, sSub:0,             // sub-bass (20–80Hz) raw/smooth
           rPresence:0, sPresence:0,   // presence (3–6kHz) raw/smooth
           spectralFlux:0,             // onset strength (spectral change)
           onsetMid:0,                 // melodic onset (mid-band transient)
           onsetHi:0,                  // hi onset (hat/cymbal transient)
           burstRadius:0,              // how far particles should spread
           cameraShake:0,              // screen shake intensity
           trailPersist:0,             // extra trail persistence on drops
           sustainLevel:0,             // smoothed sustain envelope
           // [v10] refined bands + pump envelope
           rLowMid:0, sLowMid:0,      // low-mid (258–776Hz)
           pump:0,                     // global sidechain envelope (0=compressed, 1=released)
           pumpDepth:0,                // how deep the pump bites (energy-scaled)
           // [v11] megaPump: drop-triggered massive pump (0=relaxed, 1=max compression)
           megaPump:0,
           // [v14] mid-band split + formant dynamics + groove lock
           rMidCore:0, sMidCore:0,     // mid-core (776–1808Hz) growl formant zone
           rUpperMid:0, sUpperMid:0,   // upper-mid (1808–3017Hz) lead harmonics
           formantDrive:0,             // continuous formant sweep signal (midCore delta)
           beatPhase:0,                // 0→1 per beat, phase-locked to BPM
           spectralCentroid:0,         // real-time spectral centroid (0–1)
           // [v15] timbral descriptors — flatness, roughness, MFCC
           spectralFlatness:0,         // 0=tonal/narrow, 1=noisy/broadband
           roughness:0,                // psychoacoustic roughness approx (inter-bin variance)
           mfcc1:0,                    // spectral tilt (low vs high energy balance)
           mfcc2:0,                    // spectral curvature (single vs dual peak — formant structure)
           };
let longTermEnergy = 0;
let peakEnergy     = 0.01;
let burstStrength  = 0.0;
let pullBack       = 1.0;
let chaosLevel     = 1.0;
let lastBurstTime  = -999;
var MP={bassPhase:0,midPhase:0,hiPhase:0,energyPhase:0,spectralCentroid:0.5};
const MOUSE={x:0,y:0,tx:0,ty:0};
window.addEventListener('mousemove',e=>{
  MOUSE.tx=(e.clientX/window.innerWidth -0.5)*2;
  MOUSE.ty=-(e.clientY/window.innerHeight-0.5)*2;
});

const BEAT_HISTORY = 52;
const bassHist = new Float32Array(BEAT_HISTORY);
const midHist  = new Float32Array(BEAT_HISTORY);
const hiHist   = new Float32Array(BEAT_HISTORY);
let histIdx = 0;
let kickCooldown=0, snareCooldown=0;

let lastKickTime = -999;
let estimatedBPM = 128;
let kickIBIs = [];

// [2] build-up / drop detection
let preBassEnergy  = 0;
let buildupHi      = 0;
let dropAlert      = 0;
let postDropCooldown = 0;

// [v8] windowed peak energy — sliding window for relative intensity
const PEAK_WINDOW = 600;
const energyWindow = new Float32Array(PEAK_WINDOW);
let energyWinIdx = 0;

// [v8] bass derivative for gradual-drop detection
let prevBass = 0;
let bassRiseAccum = 0;

// ═══════════════════════════════════════════════════════════════════
// [v12] SONG STRUCTURE DETECTION — RMS-based macro analysis
//
// Tracks rolling RMS over multiple time windows to detect:
//   - Intro/Quiet:  low sustained RMS → wide exterior view
//   - Build-up:     rising RMS trend → slow zoom-in
//   - Climax/Drop:  peak RMS sustained → deep interior close-up
//   - Breakdown:    falling RMS → slow zoom-out
//
// Camera responds with smooth interpolation (no sudden cuts).
// ═══════════════════════════════════════════════════════════════════

// RMS tracking windows
const RMS_SHORT_WINDOW  = 90;   // ~1.5s at 60fps — current energy snapshot
const RMS_LONG_WINDOW   = 600;  // ~10s — establishes baseline
const rmsShortBuf = new Float32Array(RMS_SHORT_WINDOW);
const rmsLongBuf  = new Float32Array(RMS_LONG_WINDOW);
let rmsShortIdx = 0, rmsLongIdx = 0;
let rmsShortSum = 0, rmsLongSum = 0;
let rmsShortFilled = 0, rmsLongFilled = 0;

// Peak RMS tracker (adapts to song's dynamic range)
let rmsPeakEver = 0.01;   // max RMS seen so far (decays very slowly)
let rmsFloorEver = 1.0;   // min sustained RMS seen

// Structure state
const STRUCT = {
  phase: 'quiet',       // 'quiet' | 'building' | 'climax' | 'breakdown'
  climaxLevel: 0,       // 0..1 — how "climax-like" the current moment is
  rmsShort: 0,          // current short-window average
  rmsLong: 0,           // current long-window average
  rmsTrend: 0,          // positive = building, negative = falling
  climaxThreshold: 0.6, // adaptive threshold (relative to peak)
  timeInPhase: 0,       // frames spent in current phase
};

// Camera state — smooth interpolation targets & current values
const CAM = {
  // Target values (set by structure detection)
  targetZoom: 1.0,      // 1.0 = normal, >1.0 = zoomed in (close-up)
  targetOffX: 0.0,      // horizontal offset (normalized)
  targetOffY: 0.0,      // vertical offset
  targetRotZ: 0.0,      // z-axis rotation (radians)

  // Current interpolated values (sent to shader)
  zoom: 1.0,
  offX: 0.0,
  offY: 0.0,
  rotZ: 0.0,

  // Transition speed (lower = slower, smoother)
  lerpSpeed: 0.012,     // base lerp rate
  
  // Drift animation for interest during climax
  driftPhase: 0,
  driftSpeed: 0.3,
};

// [v9] spectral flux: previous frame's spectrum for onset detection
let prevSpectrum = null;

// [v9] adaptive kick/snare thresholds — track recent peak for each
let kickThreshAdapt  = 0.12;
let snareThreshAdapt = 0.10;

// [v9] per-band onset accumulators
let prevMidBand = 0;
let prevHiBand  = 0;
let prevMidCore = 0;  // [v14] for formant dynamics delta tracking

// [v10] Global pump envelope — sidechain-style compressor feel
// pumpEnv: 0 = fully compressed (kick moment), 1 = fully released (between beats)
// Release curve follows BPM so the breathing locks to groove automatically
let pumpEnv = 1.0;

// ═══════════════════════════════════════════════════════════════════
// [v15] TIMBRAL DESCRIPTORS — Spectral Flatness, Roughness, MFCC
//
// Pre-computed mel filterbank for lightweight MFCC extraction.
// At 44100Hz, fftSize=1024 → 512 bins, binWidth ≈ 43.07 Hz
//
// We use 13 mel-spaced triangular filters covering 0–8000 Hz.
// Only MFCC C1 (spectral tilt) and C2 (curvature) are computed —
// C0 is just energy which we already have.
//
// The mel filterbank is built once on first call, then reused.
// Total per-frame cost: ~0.5ms on modern hardware.
// ═══════════════════════════════════════════════════════════════════

let melBank = null;  // lazy-initialized array of {startBin, endBin, weights[]}
const N_MEL_BANDS = 13;
const MEL_FMAX = 8000;

function hzToMel(hz) { return 2595 * Math.log10(1 + hz / 700); }
function melToHz(m) { return 700 * (Math.pow(10, m / 2595) - 1); }

function buildMelFilterbank(binCount, sampleRate) {
  const binWidth = sampleRate / (binCount * 2);  // Hz per bin
  const melMin = hzToMel(0);
  const melMax = hzToMel(MEL_FMAX);
  
  // N_MEL_BANDS + 2 edge frequencies
  const melPoints = [];
  for (let i = 0; i <= N_MEL_BANDS + 1; i++) {
    const mel = melMin + (melMax - melMin) * i / (N_MEL_BANDS + 1);
    melPoints.push(Math.floor(melToHz(mel) / binWidth));
  }
  
  const bank = [];
  for (let m = 0; m < N_MEL_BANDS; m++) {
    const start = melPoints[m];
    const center = melPoints[m + 1];
    const end = melPoints[m + 2];
    const filter = { startBin: start, endBin: Math.min(end, binCount - 1), weights: [] };
    
    for (let k = start; k <= filter.endBin; k++) {
      let w;
      if (k <= center) {
        w = (center === start) ? 1 : (k - start) / (center - start);
      } else {
        w = (end === center) ? 1 : (end - k) / (end - center);
      }
      filter.weights.push(Math.max(0, w));
    }
    bank.push(filter);
  }
  return bank;
}

// Pre-computed DCT-II basis for 13 bands, coefficients 1 and 2 only
// dctBasis[c][m] = cos(PI * c * (m + 0.5) / N_MEL_BANDS)
const dctBasis = [[], []];
for (let c = 1; c <= 2; c++) {
  for (let m = 0; m < N_MEL_BANDS; m++) {
    dctBasis[c - 1].push(Math.cos(Math.PI * c * (m + 0.5) / N_MEL_BANDS));
  }
}

function computeTimbreDescriptors(fdata, binCount) {
  // ── 1. Spectral Flatness ──────────────────────────────────────
  // geometric mean / arithmetic mean of power spectrum
  // Use log-sum for geometric mean to avoid float precision issues
  let logSum = 0, linSum = 0, validCount = 0;
  // Skip bin 0 (DC), sample every other bin for performance
  for (let i = 1; i < binCount; i += 2) {
    const val = fdata[i] / 255;
    if (val > 0.0001) {
      logSum += Math.log(val + 1e-10);
      linSum += val;
      validCount++;
    }
  }
  let flatness = 0;
  if (validCount > 2 && linSum > 0.01) {
    const geoMean = Math.exp(logSum / validCount);
    const ariMean = linSum / validCount;
    flatness = geoMean / (ariMean + 1e-10);
  }
  
  // ── 2. Roughness (spectral roughness approximation) ───────────
  // Sum of squared differences between adjacent bin energies,
  // weighted by a critical-band-like curve.
  // Bins closer together in frequency contribute more to perceived roughness.
  // We focus on the 200–4000 Hz range where roughness perception is strongest.
  const roughStartBin = Math.max(1, Math.floor(200 / (44100 / (binCount * 2))));
  const roughEndBin = Math.min(binCount - 1, Math.floor(4000 / (44100 / (binCount * 2))));
  let roughSum = 0;
  let roughCount = 0;
  for (let i = roughStartBin; i < roughEndBin; i++) {
    const a = fdata[i] / 255;
    const b = fdata[i + 1] / 255;
    const diff = a - b;
    // Weight by geometric mean of adjacent bins — only count roughness
    // where there's actual energy (silence shouldn't register as rough)
    const energy = (a + b) * 0.5;
    roughSum += diff * diff * energy;
    roughCount++;
  }
  const roughness = roughCount > 0 ? Math.sqrt(roughSum / roughCount) * 4.0 : 0;  // scale to ~0-1
  
  // ── 3. MFCC C1 & C2 (simplified) ─────────────────────────────
  // Apply mel filterbank → log energy → DCT coefficients 1 & 2
  if (!melBank) {
    melBank = buildMelFilterbank(binCount, 44100);
  }
  
  const melEnergies = new Float32Array(N_MEL_BANDS);
  for (let m = 0; m < N_MEL_BANDS; m++) {
    const f = melBank[m];
    let e = 0;
    for (let k = 0; k < f.weights.length; k++) {
      const bin = f.startBin + k;
      if (bin < binCount) {
        const val = fdata[bin] / 255;
        e += val * val * f.weights[k];  // power spectrum * filter weight
      }
    }
    melEnergies[m] = Math.log(e + 1e-10);  // log mel energy
  }
  
  // DCT-II: only C1 and C2
  let c1 = 0, c2 = 0;
  for (let m = 0; m < N_MEL_BANDS; m++) {
    c1 += melEnergies[m] * dctBasis[0][m];
    c2 += melEnergies[m] * dctBasis[1][m];
  }
  // Normalize roughly to [-1, 1] range
  c1 /= N_MEL_BANDS;
  c2 /= N_MEL_BANDS;
  
  return { flatness, roughness, mfcc1: c1, mfcc2: c2 };
}

function tick_audio(dt){
  if(!analyser) return;
  
  analyser.getByteFrequencyData(fdata);
  const binCount = analyser.frequencyBinCount;
  function avg(a,b){ let s=0; for(let i=a;i<b;i++) s+=fdata[i]; return s/((b-a)*255); }

  // ═══════════════════════════════════════════════════════════════
  // [v14] REFINED 8-BAND DECOMPOSITION
  // At 44100Hz, fftSize=1024: each bin ≈ 43.07 Hz
  //   Sub:       bins 1–2    (~43–86 Hz)     — sub-bass rumble, kick fundamental
  //   Bass:      bins 1–6    (~43–258 Hz)    — full bass (includes sub)
  //   Low-mid:   bins 6–18   (~258–776 Hz)   — warmth, bass guitar, pads, low synths
  //   MidCore:   bins 18–42  (~776–1808 Hz)  — growl formant zone, vocal body
  //   UpperMid:  bins 42–70  (~1808–3017 Hz) — synth lead harmonics, vocal air
  //   Mid:       bins 18–70  (~776–3017 Hz)  — combined mid (legacy, still used)
  //   Snare:     bins 25–90  (~1077–3876 Hz) — snare body + crack
  //   Presence:  bins 70–140 (~3017–6030 Hz) — vocal sibilance, synth brightness
  //   Hi:        bins 140–256(~6030–11025Hz) — cymbals, hi-hats, air, brilliance
  // ═══════════════════════════════════════════════════════════════
  const sub_band     = avg(1,3);
  const bass_band    = avg(1,6);
  const lowmid_band  = avg(6,18);
  const midcore_band = avg(18,42);    // [v14] growl formant zone
  const uppermid_band= avg(42,70);    // [v14] lead harmonics
  const mid_band     = avg(18,70);    // legacy combined mid
  const snare_band   = avg(25,90);
  const presence_band= avg(70,140);
  const hi_band      = avg(140, Math.min(256, binCount));
  const h_dense      = avg(100,200);

  const b = bass_band, m = mid_band, h = hi_band;
  AP.rb = b; AP.rm = m; AP.rh = h;
  AP.rSub = sub_band;
  AP.rPresence = presence_band;
  AP.rLowMid = lowmid_band;
  AP.rMidCore = midcore_band;      // [v14]
  AP.rUpperMid = uppermid_band;    // [v14]

  // ── Asymmetric envelope followers (attack/release per band) ──
  // Sub: very slow release (deep structural weight)
  AP.sSub = sub_band > AP.sSub ? AP.sSub*0.35 + sub_band*0.65 : AP.sSub*0.88 + sub_band*0.12;
  // Bass: slow release, fast attack
  AP.sb = b > AP.sb ? AP.sb*0.40 + b*0.60 : AP.sb*0.78 + b*0.22;
  // [v10] Low-mid: medium-slow (pads/chords evolve slowly)
  AP.sLowMid = lowmid_band > AP.sLowMid
    ? AP.sLowMid*0.38 + lowmid_band*0.62
    : AP.sLowMid*0.80 + lowmid_band*0.20;
  // [v14] MidCore: medium attack/release (growl formant — needs to track vowel-like changes)
  AP.sMidCore = midcore_band > AP.sMidCore
    ? AP.sMidCore*0.32 + midcore_band*0.68
    : AP.sMidCore*0.76 + midcore_band*0.24;
  // [v14] UpperMid: slightly faster (lead harmonics are more transient)
  AP.sUpperMid = uppermid_band > AP.sUpperMid
    ? AP.sUpperMid*0.30 + uppermid_band*0.70
    : AP.sUpperMid*0.72 + uppermid_band*0.28;
  // Mid: balanced attack/release
  AP.sm = m > AP.sm ? AP.sm*0.35 + m*0.65 : AP.sm*0.74 + m*0.26;
  // Presence: fast attack, medium release
  AP.sPresence = presence_band > AP.sPresence
    ? AP.sPresence*0.30 + presence_band*0.70
    : AP.sPresence*0.68 + presence_band*0.32;
  // Hi: very fast (transient clarity)
  AP.sh = h > AP.sh ? AP.sh*0.25 + h*0.75 : AP.sh*0.65 + h*0.35;
  AP.hiDense = (AP.hiDense||0)*0.55 + h_dense*0.45;

  // ── [v9] Spectral flux (onset detection) ──────────────────────
  // Sum of positive half-wave-rectified differences across all bins
  // This detects ANY sharp spectral change — works for all instrument types
  if(!prevSpectrum) prevSpectrum = new Uint8Array(binCount);
  let flux = 0;
  for(let i=1; i<binCount; i+=2){  // sample every 2nd bin for performance
    const diff = fdata[i] - prevSpectrum[i];
    if(diff > 0) flux += diff;
  }
  flux /= (binCount * 0.5 * 255); // normalize to 0-1 range
  // Copy current spectrum for next frame
  prevSpectrum.set(fdata);

  // Smooth spectral flux with fast attack, medium release
  AP.spectralFlux = flux > AP.spectralFlux
    ? AP.spectralFlux * 0.3 + flux * 0.7
    : AP.spectralFlux * 0.82 + flux * 0.18;

  // ── [v9] Per-band onset signals ─────────────────────────────
  const midDelta = Math.max(0, m - prevMidBand);
  const hiDelta  = Math.max(0, h - prevHiBand);
  prevMidBand = m;
  prevHiBand  = h;
  // Mid onset: melodic transient (new chord, new note, vocal attack)
  AP.onsetMid = midDelta > AP.onsetMid
    ? AP.onsetMid * 0.3 + midDelta * 0.7
    : AP.onsetMid * 0.78;
  // Hi onset: hat/cymbal transient
  AP.onsetHi = hiDelta > AP.onsetHi
    ? AP.onsetHi * 0.25 + hiDelta * 0.75
    : AP.onsetHi * 0.72;

  // ── [v14] Formant dynamics — continuous formant sweep perception ──
  // Tracks frame-to-frame delta of midCore band (776–1808 Hz)
  // Captures the "vowel movement" of growl bass, formant sweeps, etc.
  // Fast attack for sudden formant shifts, slow release for sustain
  const midCoreDelta = Math.abs(midcore_band - prevMidCore);
  AP.formantDrive = midCoreDelta > AP.formantDrive
    ? AP.formantDrive * 0.3 + midCoreDelta * 0.7
    : AP.formantDrive * 0.75;
  prevMidCore = midcore_band;

  // ── [v14] Spectral centroid — real-time timbral brightness ──
  // Weighted mean frequency of the spectrum, normalized to 0–1
  // Low = dark/bassy timbre, High = bright/airy timbre
  // Used in shader to shift noise field frequency and color temperature
  {
    let weightedSum = 0, totalEnergy = 0;
    for(let i = 1; i < binCount; i += 2){
      const val = fdata[i] / 255;
      weightedSum += i * val;
      totalEnergy += val;
    }
    const rawCentroid = totalEnergy > 0.01 ? weightedSum / (totalEnergy * binCount) : 0.5;
    AP.spectralCentroid = AP.spectralCentroid * 0.92 + rawCentroid * 0.08;
  }

  const now = performance.now() / 1000;

  // ── [v14] Beat phase — phase-locked LFO from estimated BPM ──
  // 0→1 per beat, allows shader to create groove-locked periodic motion
  // instead of purely amplitude-following movement
  if(lastKickTime > 0 && estimatedBPM > 60){
    const beatDurSec = 60 / estimatedBPM;
    AP.beatPhase = ((now - lastKickTime) / beatDurSec) % 1.0;
  }

  // ── [v15] Timbral descriptors — flatness, roughness, MFCC ────
  // Computed every frame from FFT data. Each signal is smoothed with
  // asymmetric attack/release to avoid jitter while tracking real changes.
  {
    const td = computeTimbreDescriptors(fdata, binCount);
    
    // Spectral flatness: medium smoothing (changes with texture, not per-note)
    AP.spectralFlatness = td.flatness > AP.spectralFlatness
      ? AP.spectralFlatness * 0.6 + td.flatness * 0.4
      : AP.spectralFlatness * 0.88 + td.flatness * 0.12;
    
    // Roughness: fast attack (distortion onset is sudden), slow release
    AP.roughness = td.roughness > AP.roughness
      ? AP.roughness * 0.35 + td.roughness * 0.65
      : AP.roughness * 0.85 + td.roughness * 0.15;
    
    // MFCC C1 (spectral tilt): slow tracking — this is a macro descriptor
    AP.mfcc1 = AP.mfcc1 * 0.90 + td.mfcc1 * 0.10;
    
    // MFCC C2 (curvature): medium-fast — tracks formant changes
    AP.mfcc2 = td.mfcc2 > AP.mfcc2
      ? AP.mfcc2 * 0.45 + td.mfcc2 * 0.55
      : AP.mfcc2 * 0.82 + td.mfcc2 * 0.18;
  }

  // ── [v9] Sustain level — smooth envelope of overall energy ────
  AP.sustainLevel = AP.sustainLevel * 0.96 + AP.energy * 0.04;

  bassHist[histIdx % BEAT_HISTORY] = b;
  midHist [histIdx % BEAT_HISTORY] = m;
  hiHist  [histIdx % BEAT_HISTORY] = h;
  histIdx++;

  const HIST_KICK = 38;
  const HIST_MID  = 22;
  const HIST_SHORT = 8;
  let bassSum=0, bassShortSum=0, midSum=0;
  for(let i=0;i<HIST_KICK;i++)
    bassSum += bassHist[(histIdx - 1 - i + BEAT_HISTORY) % BEAT_HISTORY];
  for(let i=0;i<HIST_SHORT;i++)
    bassShortSum += bassHist[(histIdx - 1 - i + BEAT_HISTORY) % BEAT_HISTORY];
  for(let i=0;i<HIST_MID;i++)
    midSum  += midHist [(histIdx - 1 - i + BEAT_HISTORY) % BEAT_HISTORY];
  const bassMean = bassSum / HIST_KICK;
  const bassShortMean = bassShortSum / HIST_SHORT;
  const midMean  = midSum  / HIST_MID;

  kickCooldown  = Math.max(0, kickCooldown-1);
  snareCooldown = Math.max(0, snareCooldown-1);
  postDropCooldown = Math.max(0, postDropCooldown-1);

  // ── [v9] Adaptive kick threshold ─────────────────────────────
  // Threshold slowly tracks recent kick-band peaks — adapts to loud/quiet tracks
  kickThreshAdapt = kickThreshAdapt * 0.998 + sub_band * 0.002;
  kickThreshAdapt = Math.max(0.06, Math.min(kickThreshAdapt, 0.25));
  const kickAbsThresh = Math.max(0.10, kickThreshAdapt * 0.85);

  const kickLongPass  = sub_band > bassMean * 1.75 && sub_band > kickAbsThresh;
  const kickShortPass = sub_band > bassShortMean * 1.40;
  if(kickCooldown===0 && kickLongPass && kickShortPass){
    AP.kickDecay = Math.min(sub_band * 1.8, 1.0);
    if(lastKickTime > 0){
      const ibi = now - lastKickTime;
      if(ibi > 0.28 && ibi < 1.5){
        kickIBIs.push(ibi);
        if(kickIBIs.length > 12) kickIBIs.shift();
        const sorted = kickIBIs.slice().sort((a,b)=>a-b);
        // [v9] trimmed median: drop outliers at both ends
        const trimStart = Math.floor(sorted.length * 0.15);
        const trimEnd   = Math.ceil(sorted.length * 0.85);
        let ibiSum = 0, ibiCount = 0;
        for(let i=trimStart; i<trimEnd; i++){ ibiSum += sorted[i]; ibiCount++; }
        const medIBI = ibiCount > 0 ? ibiSum / ibiCount : sorted[Math.floor(sorted.length/2)];
        const newBPM = Math.min(Math.max(60/medIBI, 80), 185);
        const bpmChange = Math.abs(newBPM - estimatedBPM) / estimatedBPM;
        estimatedBPM = bpmChange < 0.12 ? newBPM : estimatedBPM * 0.90 + newBPM * 0.10;
      }
    }
    lastKickTime = now;
    kickCooldown = Math.max(8, Math.round((60/estimatedBPM)*60*0.45));
  }

  // ── [v9] Adaptive snare threshold ────────────────────────────
  snareThreshAdapt = snareThreshAdapt * 0.998 + snare_band * 0.002;
  snareThreshAdapt = Math.max(0.05, Math.min(snareThreshAdapt, 0.20));
  const snareAbsThresh = Math.max(0.08, snareThreshAdapt * 0.80);
  
  // [v9] Snare: spectral flux in mid-hi range confirms it's a transient, not sustained pad
  const midHiFlux = midDelta + hiDelta;
  if(snareCooldown===0 && snare_band > midMean*1.55 && snare_band > snareAbsThresh
     && midHiFlux > 0.015){
    AP.snareDecay = Math.min(snare_band * 1.4, 1.0);
    snareCooldown = Math.max(8, Math.round((60/estimatedBPM)*60*0.40));
  }

  const beatDur = 60 / estimatedBPM;
  AP.kickDecay  *= Math.exp(-dt / (beatDur * 0.30));
  AP.snareDecay *= Math.exp(-dt / (beatDur * 0.26));
  AP.kick  = AP.kickDecay;
  AP.snare = AP.snareDecay;

  // ═══════════════════════════════════════════════════════════════
  // [v10] GLOBAL PUMP ENVELOPE — sidechain compressor feel
  //
  // This is ONE number that the entire visual system breathes with.
  // pumpEnv: 0 = compressed (kick moment), 1 = fully released
  //
  // On kick: instantly snap toward 0 (fast attack)
  // Between kicks: exponential release back to 1, timed to ~70% of a beat
  //
  // The DEPTH of the pump is energy-scaled:
  //   - Quiet passage: pumpDepth ≈ 0 → almost no visual pump
  //   - Building:      pumpDepth grows slowly
  //   - Drop/climax:   pumpDepth → 0.6–1.0 → full sidechain breathing
  //
  // What the shader does with uPump:
  //   - Global scale compression (everything tightens on kick, releases between)
  //   - Brightness/density modulation (compressed = dimmer/denser, released = open)
  //   - NOT per-particle displacement — it's an envelope, not a position offset
  // ═══════════════════════════════════════════════════════════════

  // Release: exponential curve timed to beat duration
  // At 128 BPM: beatDur=0.47s, release ~0.33s (70% of beat)
  const releaseRate = 1.0 / (beatDur * 0.70);
  pumpEnv += (1.0 - pumpEnv) * Math.min(releaseRate * dt, 0.15);

  // Attack: kick triggers compression
  // The attack amount is proportional to kick strength — soft kicks = gentle dip
  if(AP.kickDecay > 0.4 && kickCooldown <= 1){
    const attackStr = Math.min(AP.kickDecay * 1.2, 1.0);
    pumpEnv = pumpEnv * (1.0 - attackStr * 0.85);  // snap toward 0
  }

  // [v14] Sub-bass auxiliary pump: growl bass between kicks also compresses slightly
  // Uses fast RMS of sub+bass band — each growl "syllable" gets a micro-pump
  // Much gentler than kick pump (0.30 vs 0.85), but fills the gaps with breathing
  {
    const subBassRMS = sub_band * 0.4 + bass_band * 0.6;
    const subThresh = 0.08 + AP.sSub * 0.5;  // adaptive threshold tracks sub level
    if(subBassRMS > subThresh && kickCooldown > 4){
      const auxAttack = Math.min((subBassRMS - subThresh) * 3.0, 0.5);
      pumpEnv = pumpEnv * (1.0 - auxAttack * 0.30);  // gentler than kick
    }
  }

  // Pump depth: how much the envelope actually affects visuals
  // Scales with energy stage — quiet=nothing, loud=full
  // [v11] faster response: 0.92/0.08 instead of 0.95/0.05 — pump wakes up quicker
  const rawPumpDepth = AP.relativeIntensity * 0.5 + AP.energy * 0.3 + AP.dropAlert * 0.4;
  AP.pumpDepth = AP.pumpDepth * 0.92 + Math.min(rawPumpDepth, 1.0) * 0.08;

  // Final pump signal: 0 = no effect, 1 = max compression
  // pumpEnv=0 means "compressed", but we want uPump=1 to mean "compressed"
  // so shader can multiply: scale *= (1.0 - uPump * depth)
  AP.pump = (1.0 - pumpEnv) * AP.pumpDepth;

  // [v10] Energy calculation with 6-band weighting
  AP.energy = AP.sSub*0.15 + AP.sb*0.15 + AP.sLowMid*0.15 + AP.sm*0.25 + AP.sh*0.15 + AP.sPresence*0.15;

  // [v10] Spectral balance — include lowMid
  const bandTotal = AP.sb + AP.sLowMid + AP.sm + AP.sh + 0.001;
  AP.bassRatio = AP.sb / bandTotal;
  AP.hiRatio   = AP.sh / bandTotal;
  AP.spectralContrast = AP.spectralContrast * 0.92 + (AP.bassRatio - AP.hiRatio) * 0.08;

  // [v8] Windowed peak energy
  energyWindow[energyWinIdx % PEAK_WINDOW] = AP.energy;
  energyWinIdx++;
  let windowMax = 0;
  const filled = Math.min(energyWinIdx, PEAK_WINDOW);
  for(let i=0; i<filled; i+=8){
    const val = energyWindow[(energyWinIdx - 1 - i + PEAK_WINDOW) % PEAK_WINDOW];
    if(val > windowMax) windowMax = val;
  }
  peakEnergy = Math.max(windowMax * 0.92, AP.energy);
  longTermEnergy = longTermEnergy * 0.997 + AP.energy * 0.003;
  AP.relativeIntensity = Math.max(0,
    (AP.energy - longTermEnergy) / (peakEnergy - longTermEnergy + 0.01)
  );

  // ── Build-up → drop detection ─────────────────────────────────
  const bassDeriv = b - prevBass;
  prevBass = b;
  
  preBassEnergy = preBassEnergy * 0.97 + b * 0.03;
  // [v10] buildupHi uses presence+hi (true treble), excludes mid content
  const trebleEnergy = presence_band * 0.6 + hi_band * 0.4;
  buildupHi = buildupHi * 0.992 + (trebleEnergy - preBassEnergy * 0.5) * 0.008;
  buildupHi = Math.max(0, buildupHi);

  const bassReturn = b > preBassEnergy * 2.2 && preBassEnergy < 0.12;
  bassRiseAccum = bassDeriv > 0.003 ? bassRiseAccum + bassDeriv : bassRiseAccum * 0.85;
  // [v14] Lower threshold for gradual drops in dark bass/midtempo
  // Bass-gradient drop: doesn't require buildupHi > 0.03 — bass alone can trigger
  const gradualDrop = bassRiseAccum > 0.06 && preBassEnergy < 0.15 && buildupHi > 0.02;
  // [v14] Pure bass gradient: for tracks where hi doesn't build at all
  const bassGradientDrop = bassRiseAccum > 0.12 && preBassEnergy < 0.12;

  if((bassReturn || gradualDrop || bassGradientDrop) && (buildupHi > 0.02 || bassGradientDrop) && postDropCooldown === 0){
    dropAlert = 1.0;
    buildupHi = 0;
    bassRiseAccum = 0;
    postDropCooldown = Math.round(estimatedBPM / 60 * 60 * 8);
  }
  dropAlert *= 0.94;

  // burstFlash: every kick triggers, drop gives extra punch
  if(AP.kickDecay > 0.08){
    const base    = AP.kickDecay * 0.55;
    const bonus   = AP.relativeIntensity * AP.kickDecay * 0.85;
    const dropMul = 1.0 + dropAlert * 1.2;
    const flashTarget = Math.min((base + bonus) * dropMul, 0.80);
    if(flashTarget > AP.burstFlash) AP.burstFlash = flashTarget;
  }
  AP.burstFlash *= 0.80;

  // ═══════════════════════════════════════════════════════════════
  // [v9] EXPLOSION SYSTEM — intensity-scaled bursts
  // ═══════════════════════════════════════════════════════════════
  const dropBurst    = dropAlert > 0.7 && postDropCooldown > Math.round(estimatedBPM/60*60*7.5);
  const climaxBurst  = AP.kickDecay > 0.30 && AP.relativeIntensity > 0.45 && now - lastBurstTime > 3.0;
  // [v9] Spectral-flux burst: any massive transient (crash cymbal, impact FX) can trigger
  const fluxBurst    = AP.spectralFlux > 0.25 && AP.relativeIntensity > 0.40 && now - lastBurstTime > 2.0;

  if(dropBurst || climaxBurst || fluxBurst){
    if(dropBurst){
      burstStrength = 0.95 + dropAlert * 0.45;
      AP.burstRadius = 1.8 + dropAlert * 0.8;  // [v9] wide spread on drop
      AP.cameraShake = 0.45 + dropAlert * 0.35; // [v9] big shake
      AP.trailPersist = 0.85;                    // [v9] trails linger
      AP.megaPump = 1.0;                         // [v11] full mega pump on drop
    } else if(climaxBurst){
      burstStrength = 0.50 + AP.relativeIntensity * 0.45;
      AP.burstRadius = 1.0 + AP.relativeIntensity * 0.6;
      AP.cameraShake = 0.15 + AP.relativeIntensity * 0.20;
      AP.trailPersist = 0.3;
      AP.megaPump = 0.65 + AP.relativeIntensity * 0.35; // [v11] strong but less than drop
    } else {
      burstStrength = 0.35 + AP.spectralFlux * 0.5;
      AP.burstRadius = 0.8 + AP.spectralFlux * 0.4;
      AP.cameraShake = 0.10 + AP.spectralFlux * 0.15;
      AP.trailPersist = 0.15;
      AP.megaPump = Math.max(AP.megaPump, 0.45); // [v11] gentle mega for flux bursts
    }
    pullBack      = 0.0;
    lastBurstTime = now;
  }
  // [v11] megaPump: two-phase decay — fast initial drop, then slow elastic release
  // This gives the "slam then breathe out" feel
  if(AP.megaPump > 0.4){
    AP.megaPump *= 0.88;        // fast initial decay (slam phase)
  } else {
    AP.megaPump *= 0.955;       // slow tail release (exhale phase)
  }
  if(AP.megaPump < 0.005) AP.megaPump = 0;
  // Two-phase decay
  if(burstStrength > 0.3){
    burstStrength *= 0.90;
  } else {
    burstStrength *= 0.96;
  }
  // Burst radius decay
  AP.burstRadius = (AP.burstRadius || 0) * 0.94;
  // Camera shake decay (fast)
  AP.cameraShake = (AP.cameraShake || 0) * 0.85;
  // Trail persistence decay
  AP.trailPersist = (AP.trailPersist || 0) * 0.92;

  // Pull-back with elastic overshoot
  const pullDiff = 1.0 - pullBack;
  if(pullDiff > 0){
    pullBack += pullDiff * 0.022;
  } else {
    pullBack += pullDiff * 0.08;
  }
  if(pullBack > 0.95 && pullBack < 1.06 && burstStrength < 0.15){
    const overshootTarget = 1.0 + (1.0 - Math.min(burstStrength * 8, 1.0)) * 0.035;
    pullBack += (overshootTarget - pullBack) * 0.04;
  }

  // ── D: chaos ─────────────────────────────────────────────
  if(AP.kickDecay > 0.25 && AP.relativeIntensity > 0.35){
    const chaosTarget = 1.0 + AP.relativeIntensity * 2.2 + dropAlert * 1.5;
    if(chaosTarget > chaosLevel) chaosLevel = chaosTarget;
  }
  chaosLevel += (1.0 - chaosLevel) * 0.022;

  // Phase accumulators
  const hiAccel = 1.0 + AP.hiDense * 3.5;
  MP.bassPhase   += (AP.rb*0.6 + AP.sb*0.4) * 0.020 + 0.003;
  MP.midPhase    += (AP.rm*0.6 + AP.sm*0.4) * 0.014 + 0.002;
  MP.hiPhase     += (AP.rh*0.6 + AP.sh*0.4) * 0.025 * hiAccel + 0.0015;
  MP.energyPhase += AP.energy * 0.008 + 0.001;

  const total = AP.sb+AP.sm+AP.sh+0.001;
  MP.spectralCentroid = AP.spectralCentroid;  // [v14] use real-time centroid
  AP.dropAlert = dropAlert;
}

// ═══════════════════════════════════════════════════════════════════
// [v12] SONG STRUCTURE ANALYSIS + CAMERA CONTROL
// ═══════════════════════════════════════════════════════════════════

function updateStructureAndCamera(){
  const energy = AP.energy;

  // ── 1. Update RMS buffers ─────────────────────────────────────
  // Short window: replace oldest sample
  if(rmsShortFilled >= RMS_SHORT_WINDOW){
    rmsShortSum -= rmsShortBuf[rmsShortIdx % RMS_SHORT_WINDOW];
  }
  rmsShortBuf[rmsShortIdx % RMS_SHORT_WINDOW] = energy;
  rmsShortSum += energy;
  rmsShortIdx++;
  rmsShortFilled = Math.min(rmsShortFilled + 1, RMS_SHORT_WINDOW);

  // Long window
  if(rmsLongFilled >= RMS_LONG_WINDOW){
    rmsLongSum -= rmsLongBuf[rmsLongIdx % RMS_LONG_WINDOW];
  }
  rmsLongBuf[rmsLongIdx % RMS_LONG_WINDOW] = energy;
  rmsLongSum += energy;
  rmsLongIdx++;
  rmsLongFilled = Math.min(rmsLongFilled + 1, RMS_LONG_WINDOW);

  STRUCT.rmsShort = rmsShortFilled > 0 ? rmsShortSum / rmsShortFilled : 0;
  STRUCT.rmsLong  = rmsLongFilled  > 0 ? rmsLongSum  / rmsLongFilled  : 0;

  // ── 2. Track peak/floor (adaptive dynamic range) ──────────────
  // Peak decays very slowly so it adapts to the song's loudest moment
  rmsPeakEver = Math.max(rmsPeakEver * 0.9997, STRUCT.rmsShort);
  // Floor rises slowly toward quiet passages
  if(STRUCT.rmsLong > 0.01 && rmsLongFilled > 120){
    rmsFloorEver = Math.min(rmsFloorEver * 1.0001 + 0.0001, STRUCT.rmsLong * 0.5);
  }

  // ── 3. Compute normalized climax level ────────────────────────
  // climaxLevel: 0 = at floor, 1 = at peak
  const dynamicRange = rmsPeakEver - rmsFloorEver + 0.001;
  const rawClimax = (STRUCT.rmsShort - rmsFloorEver) / dynamicRange;
  STRUCT.climaxLevel = Math.max(0, Math.min(1, rawClimax));

  // Trend: difference between short and long averages (positive = building)
  STRUCT.rmsTrend = (STRUCT.rmsShort - STRUCT.rmsLong) / (dynamicRange + 0.01);

  // ── 4. Determine structural phase ─────────────────────────────
  //
  // [v13] CLIMAX RECALIBRATION:
  //   - Climax requires BOTH high climaxLevel AND sustained high rmsShort
  //   - Threshold raised: cl > 0.75 (was 0.65), peak ratio 0.65 (was 0.55)
  //   - Must sustain for at least 60 frames (~1s) before confirming climax
  //   - Building requires stronger trend (0.10 vs 0.08)
  //   - Breakdown exits faster to keep things responsive
  //
  const prevPhase = STRUCT.phase;
  const cl = STRUCT.climaxLevel;
  const trend = STRUCT.rmsTrend;

  if(cl > 0.75 && STRUCT.rmsShort > rmsPeakEver * 0.65 && STRUCT.timeInPhase > 60){
    STRUCT.phase = 'climax';
  } else if(cl > 0.75 && STRUCT.rmsShort > rmsPeakEver * 0.65 && prevPhase === 'climax'){
    // Already in climax — stay (hysteresis: easier to stay than to enter)
    STRUCT.phase = 'climax';
  } else if(trend > 0.10 && cl > 0.35){
    STRUCT.phase = 'building';
  } else if(trend < -0.05 && cl < 0.45){
    STRUCT.phase = 'breakdown';
  } else if(cl < 0.20){
    STRUCT.phase = 'quiet';
  }
  // else: keep current phase (hysteresis)

  if(STRUCT.phase !== prevPhase){
    STRUCT.timeInPhase = 0;
  }
  STRUCT.timeInPhase++;

  // ── 5. Set camera targets based on phase ──────────────────────
  //
  // [v13] CAMERA REVISION:
  //   - Zoom range preserved (up to ~2.8x) — don't nerf the immersion
  //   - CENTER ANCHOR: offset clamped tight so the structure never drifts off-screen
  //   - You see both the expansion AND the global form because center holds
  //   - Sacra & Organic bypass camera entirely (smooth return to 1.0)
  //
  CAM.driftPhase += 0.016 * CAM.driftSpeed;

  // Sacra (style 2) and Organic (style 4): bypass camera system entirely
  // Smooth lerp back to neutral — RMS tracking + HUD still run above
  if(currentStyle === 2 || currentStyle === 4){
    CAM.targetZoom = 1.0;
    CAM.targetOffX = 0.0;
    CAM.targetOffY = 0.0;
    CAM.targetRotZ = 0.0;
    CAM.lerpSpeed  = 0.025;  // fairly quick return to neutral
  } else {

    switch(STRUCT.phase){
      case 'quiet':
        // Wide exterior view — full structure visible
        CAM.targetZoom = 1.0;
        CAM.targetOffX = Math.sin(CAM.driftPhase * 0.3) * 0.012;
        CAM.targetOffY = Math.cos(CAM.driftPhase * 0.23) * 0.008;
        CAM.targetRotZ = Math.sin(CAM.driftPhase * 0.17) * 0.012;
        CAM.lerpSpeed  = 0.010;
        break;

      case 'building':
        // Zooming in — anticipation builds
        {
          const buildProgress = Math.min(1, cl / 0.65);
          CAM.targetZoom = 1.0 + buildProgress * 0.7;  // up to 1.7x
          // Drift stays small — center anchored
          CAM.targetOffX = Math.sin(CAM.driftPhase * 0.5) * 0.03 * buildProgress;
          CAM.targetOffY = Math.cos(CAM.driftPhase * 0.4) * 0.02 * buildProgress;
          CAM.targetRotZ = Math.sin(CAM.driftPhase * 0.25) * 0.025 * buildProgress;
          CAM.lerpSpeed  = 0.015;
        }
        break;

      case 'climax':
        // Deep zoom — but center anchor holds, global form still readable
        {
          const climaxIntensity = Math.min(1, (cl - 0.5) * 2.0);
          CAM.targetZoom = 1.7 + climaxIntensity * 1.1;  // up to 2.8x
          // Drift clamped tight: center stays put
          const driftAmp = 0.03 + climaxIntensity * 0.04;
          CAM.targetOffX = Math.sin(CAM.driftPhase * 0.7) * driftAmp;
          CAM.targetOffY = Math.cos(CAM.driftPhase * 0.53) * driftAmp * 0.7;
          CAM.targetRotZ = Math.sin(CAM.driftPhase * 0.31) * 0.035 * climaxIntensity;
          // Bass micro-nudge — NOT drift, just texture
          CAM.targetOffX += AP.rb * 0.018 * Math.sin(CAM.driftPhase * 3.0);
          CAM.targetOffY += AP.rb * 0.012 * Math.cos(CAM.driftPhase * 2.7);
          CAM.lerpSpeed  = 0.018;
        }
        break;

      case 'breakdown':
        // Pulling back out
        {
          const breakProgress = Math.min(1, STRUCT.timeInPhase / 180);
          CAM.targetZoom = 1.7 - breakProgress * 0.7;  // ease back toward 1.0
          CAM.targetOffX = Math.sin(CAM.driftPhase * 0.35) * 0.025 * (1 - breakProgress);
          CAM.targetOffY = Math.cos(CAM.driftPhase * 0.28) * 0.018 * (1 - breakProgress);
          CAM.targetRotZ = Math.sin(CAM.driftPhase * 0.2) * 0.015 * (1 - breakProgress);
          CAM.lerpSpeed  = 0.012;
        }
        break;
    }
  }

  // ── 6. Smooth interpolation ───────────────────────────────────
  const spd = CAM.lerpSpeed;
  CAM.zoom += (CAM.targetZoom - CAM.zoom) * spd;
  CAM.offX += (CAM.targetOffX - CAM.offX) * spd;
  CAM.offY += (CAM.targetOffY - CAM.offY) * spd;
  CAM.rotZ += (CAM.targetRotZ - CAM.rotZ) * spd;
}

function getCurrentTime(){
  if(!actx||!isPlaying) return startOffset;
  return startOffset + (actx.currentTime - startTime);
}

function seekTo(t){
  if(!abuf) return;
  t = Math.max(0, Math.min(t, songDuration));
  if(srcNode){ try{srcNode.stop();}catch(e){} }
  startOffset = t;
  startTime   = actx.currentTime;
  kickCooldown = 0; snareCooldown = 0; postDropCooldown = 0;
  pumpEnv = 1.0;  // [v10]
  seekedRecently = true;

  const pct = (t / songDuration) * 100;
  progFill.style.width = pct + '%';
  progThumb.style.left = pct + '%';
  progCur.textContent = fmtTime(t);

  if(isPlaying){
    srcNode = actx.createBufferSource();
    srcNode.buffer = abuf;
    srcNode.connect(analyser);
    srcNode.onended = onSongEnded;
    srcNode.start(0, t);
  } else {
    srcNode = null;
  }
}

function onSongEnded(){
  if(seekedRecently){ seekedRecently=false; return; }
  const ct = getCurrentTime();
  if(ct >= songDuration - 0.5){
    showEndOverlay();
  }
}

function showEndOverlay(){
  isPlaying=false;
  if(srcNode){ try{srcNode.stop();}catch(e){} srcNode=null; }
  abuf=null; songDuration=0; startOffset=0;
  if(actx && actx.state === 'suspended') actx.resume();
  fnEl.textContent='';
  pbEl.style.display='none';
  pbEl.textContent='Play';
  fiEl.value='';
  uiEl.style.display='flex';
  uiEl.style.opacity='0';
  hudEl.classList.remove('on');
  progressBar.classList.remove('on');
  document.getElementById('spectrograph-3d').classList.remove('on');
  document.getElementById('struct-phase').style.display='none';
  document.getElementById('style-switcher').classList.remove('on');
  document.getElementById('vol-wrap').classList.remove('on');
  document.getElementById('fs-btn').classList.remove('on');
  document.getElementById('stop-btn').classList.remove('on');
  requestAnimationFrame(()=>{
    uiEl.style.transition='opacity 1.2s ease';
    uiEl.style.opacity='1';
  });
  uiEl.classList.remove('gone');
}

// Stop playback and return to upload screen
function stopAndReturn(){
  showEndOverlay();
}

async function loadf(file){
  if(!file) return;
  try {
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    if(actx.state === 'suspended') await actx.resume();
    const arrayBuf = await file.arrayBuffer();
    abuf=await actx.decodeAudioData(arrayBuf);
    songDuration=abuf.duration;
    fnEl.textContent=file.name.replace(/\.[^/.]+$/,'');
    pbEl.style.display='block';
    pbEl.textContent='Play';
  } catch(err) {
    console.error('Audio load error:', err);
    fnEl.textContent='Error loading file – try again';
    pbEl.style.display='none';
  }
}

// [v8] Waveform minimap renderer
function renderWaveform(){
  const wfCanvas = document.getElementById('waveform-canvas');
  const track = document.getElementById('prog-track');
  const rect = track.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.floor(rect.width * dpr);
  const h = Math.floor(rect.height * dpr) || 16;
  wfCanvas.width = w;
  wfCanvas.height = h;
  wfCanvas.style.width = rect.width + 'px';
  wfCanvas.style.height = '100%';
  
  const ctx = wfCanvas.getContext('2d');
  if(!abuf || !ctx) return;
  
  const raw = abuf.getChannelData(0);
  const buckets = w;
  const samplesPerBucket = Math.floor(raw.length / buckets);
  
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  
  for(let i=0; i<buckets; i++){
    let maxAmp = 0;
    const start = i * samplesPerBucket;
    // Sample every 4th for performance
    for(let j=0; j<samplesPerBucket; j+=4){
      const amp = Math.abs(raw[start+j] || 0);
      if(amp > maxAmp) maxAmp = amp;
    }
    const barH = maxAmp * h * 0.9;
    ctx.fillRect(i, (h-barH)/2, 1, Math.max(1, barH));
  }
}

    actx.suspend();

    pauseBtn.textContent = '▶';
  } else {
    // Resume: restart from saved offset
    actx.resume().then(()=>{
      if(srcNode){ try{ srcNode.stop(); }catch(e){} }
      srcNode = actx.createBufferSource();
      srcNode.buffer = abuf;
      srcNode.connect(analyser);
      srcNode.onended = onSongEnded;
      startTime = actx.currentTime;
      srcNode.start(0, startOffset);
      isPlaying = true;
      pauseBtn.textContent = '❙❙';
    });
  }
});

const N_LORENZ  = 25000;
const N_ROSSLER = 20000;
const N_THOMAS  = 15000;
const N = N_LORENZ + N_ROSSLER + N_THOMAS;

function solveLorenz(steps, sigma, rho, beta, dt){
  let x=0.1,y=0,z=0;
  const pts=[];
  for(let i=0;i<2000;i++){
    const dx=sigma*(y-x), dy=x*(rho-z)-y, dz=x*y-beta*z;
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
  }
  for(let i=0;i<steps;i++){
    const dx=sigma*(y-x), dy=x*(rho-z)-y, dz=x*y-beta*z;
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
    pts.push(x,y,z);
  }
  return pts;
}

function solveRossler(steps, a, b, c, dt){
  let x=1,y=0,z=0;
  const pts=[];
  for(let i=0;i<1000;i++){
    const dx=-(y+z), dy=x+a*y, dz=b+z*(x-c);
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
  }
  for(let i=0;i<steps;i++){
    const dx=-(y+z), dy=x+a*y, dz=b+z*(x-c);
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
    pts.push(x,y,z);
  }
  return pts;
}

function solveThomas(steps, b, dt){
  let x=0.1,y=0,z=0;
  const pts=[];
  for(let i=0;i<1000;i++){
    const dx=Math.sin(y)-b*x, dy=Math.sin(z)-b*y, dz=Math.sin(x)-b*z;
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
  }
  for(let i=0;i<steps;i++){
    const dx=Math.sin(y)-b*x, dy=Math.sin(z)-b*y, dz=Math.sin(x)-b*z;
    x+=dx*dt; y+=dy*dt; z+=dz*dt;
    pts.push(x,y,z);
  }
  return pts;
}

function normalizePoints(raw){
  let mx=Infinity,my=Infinity,mz=Infinity;
  let Mx=-Infinity,My=-Infinity,Mz=-Infinity;
  for(let i=0;i<raw.length;i+=3){
    if(raw[i]<mx) mx=raw[i]; if(raw[i]>Mx) Mx=raw[i];
    if(raw[i+1]<my) my=raw[i+1]; if(raw[i+1]>My) My=raw[i+1];
    if(raw[i+2]<mz) mz=raw[i+2]; if(raw[i+2]>Mz) Mz=raw[i+2];
  }
  const scale=2/Math.max(Mx-mx,My-my,Mz-mz);
  const cx=(Mx+mx)/2, cy=(My+my)/2, cz=(Mz+mz)/2;
  const out=new Float32Array(raw.length);
  for(let i=0;i<raw.length;i+=3){
    out[i]  =(raw[i]  -cx)*scale;
    out[i+1]=(raw[i+1]-cy)*scale;
    out[i+2]=(raw[i+2]-cz)*scale;
  }
  return out;
}

function buildBase(){
  console.log('Computing chaos attractors...');

  const lRaw=solveLorenz(N_LORENZ, 10,28,8/3, 0.005);
  const rRaw=solveRossler(N_ROSSLER, 0.2,0.2,5.7, 0.05);
  const tRaw=solveThomas(N_THOMAS, 0.19, 0.05);

  const lN=normalizePoints(lRaw);
  const rN=normalizePoints(rRaw);
  const tN=normalizePoints(tRaw);

  const pos  = new Float32Array(N*3);
  const seed = new Float32Array(N*3);
  const layer= new Float32Array(N);

  let idx=0;
  for(let i=0;i<N_LORENZ;i++){
    pos[idx*3]  = lN[i*3]*1.4 - 0.5;
    pos[idx*3+1]= lN[i*3+1]*0.9 - 0.1;
    pos[idx*3+2]= lN[i*3+2]*0.8;
    layer[idx]=0;
    seed[idx*3]=Math.random()*6.283;
    seed[idx*3+1]=Math.random()*6.283;
    seed[idx*3+2]=Math.random();
    idx++;
  }
  for(let i=0;i<N_ROSSLER;i++){
    const rx=rN[i*3], ry=rN[i*3+1], rz=rN[i*3+2];
    const c=0.707, s=0.707;
    pos[idx*3]  = (rx*c+rz*s)*1.1 + 0.55;
    pos[idx*3+1]= ry*1.1 - 0.45;
    pos[idx*3+2]= (-rx*s+rz*c)*0.7;
    layer[idx]=1;
    seed[idx*3]=Math.random()*6.283;
    seed[idx*3+1]=Math.random()*6.283;
    seed[idx*3+2]=Math.random();
    idx++;
  }
  for(let i=0;i<N_THOMAS;i++){
    pos[idx*3]  = tN[i*3]*1.6;
    pos[idx*3+1]= tN[i*3+1]*1.6;
    pos[idx*3+2]= tN[i*3+2]*1.6;
    layer[idx]=2;
    seed[idx*3]=Math.random()*6.283;
    seed[idx*3+1]=Math.random()*6.283;
    seed[idx*3+2]=Math.random();
    idx++;
  }

  const MIN_R = 0.18;
  const PUSH_R = 0.55;
  for(let i=0;i<N;i++){
    const x=pos[i*3], y=pos[i*3+1], z=pos[i*3+2];
    const r=Math.sqrt(x*x+y*y+z*z);
    if(r<PUSH_R && r>0.0001){
      const push=MIN_R*(1-r/PUSH_R)*(1-r/PUSH_R);
      const nx=x/r, ny=y/r, nz=z/r;
      pos[i*3]  =x+nx*push;
      pos[i*3+1]=y+ny*push;
      pos[i*3+2]=z+nz*push;
    }
  }

  return {pos,seed,layer};
}

let W=0,H=0;
let _progUid = 0;

function mkShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
    console.error('Shader:',gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))
    console.error('Link:',gl.getProgramInfoLog(p));
  p.__uid = _progUid++;
  return p;
}
function mkFBO(w,h){
  const fb=gl.createFramebuffer(), tx=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tx);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tx,0);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return {fb,tx};
}
function mkVbo(data){
  const b=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,b);
  gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);
  return b;
}
function bindAttr(prog,name,buf,size){
  const loc=gl.getAttribLocation(prog,name);
  if(loc<0) return;
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,size,gl.FLOAT,false,0,0);
}
function drawQuad(prog){
  const loc=gl.getAttribLocation(prog,'aPos');
  gl.bindBuffer(gl.ARRAY_BUFFER,quadVbo);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}
function useTex(prog,name,unit,fbo){
  gl.activeTexture(gl.TEXTURE0+unit);
  gl.bindTexture(gl.TEXTURE_2D,fbo.tx);
  gl.uniform1i(uLoc(prog,name),unit);
}
const _uCache = new Map();
function uLoc(p,n){
  const key = p.__uid + '|' + n;
  let loc = _uCache.get(key);
  if(loc === undefined){ loc = gl.getUniformLocation(p,n); _uCache.set(key, loc); }
  return loc;
}
function u1(p,n,v){ gl.uniform1f(uLoc(p,n),v); }
function u2(p,n,x,y){ gl.uniform2f(uLoc(p,n),x,y); }
function u3(p,n,x,y,z){ gl.uniform3f(uLoc(p,n),x,y,z); }
